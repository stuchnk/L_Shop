<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина L_Shop</title>
    <link rel="stylesheet" href="trash.css">
</head>
<body>
    <div class="cart-container">
        <h1 class="cart-title">Ваша корзина <span class="count-badge">(3)</span></h1>
        
        <div class="cart-layout">
            <main class="cart-items">
                <div class="product-card">
                    <img src="https://via.placeholder.com/120" alt="Товар" class="product-img">
                    <div class="product-info">
                        <h3 class="product-name">Стильное худи L_Shop</h3>
                        <p class="product-price">4 500 руб.</p>
                        <div class="qty-selector">
                            <button class="qty-btn">−</button>
                            <span class="qty-num">1</span>
                            <button class="qty-btn">+</button>
                        </div>
                    </div>
                    <button class="delete-btn" title="Удалить">&times;</button>
                </div>

                <div class="product-card">
                    <img src="https://via.placeholder.com/120" alt="Товар" class="product-img">
                    <div class="product-info">
                        <h3 class="product-name">Кроссовки Urban Edition</h3>
                        <p class="product-price">8 900 руб.</p>
                        <div class="qty-selector">
                            <button class="qty-btn">−</button>
                            <span class="qty-num">2</span>
                            <button class="qty-btn">+</button>
                        </div>
                    </div>
                    <button class="delete-btn" title="Удалить">&times;</button>
                </div>
            </main>

            <aside class="cart-sidebar">
                <div class="checkout-card">
                    <h2 class="summary-title">Итого</h2>
                    <div class="summary-details">
                        <div class="summary-line">
                            <span>Количество:</span>
                            <span>3 шт.</span>
                        </div>
                        <div class="summary-line">
                            <span>Скидка:</span>
                            <span class="discount">- 0 руб.</span>
                        </div>
                        <div class="summary-line total">
                            <span>К оплате:</span>
                            <span class="total-val">13 400 руб.</span>
                        </div>
                    </div>
                    <button class="main-pay-btn">Оформить заказ</button>
                    <p class="delivery-note">Безопасная оплата картой</p>
                </div>
            </aside>
        </div>
    </div>
</body>
</html>
